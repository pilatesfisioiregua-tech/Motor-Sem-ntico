app = "chief-os-omni"
primary_region = "cdg"

[build]
  dockerfile = "motor-semantico/motor_v1_validation/agent/Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  CODE_OS_PROJECT_DIR = "/repo"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
