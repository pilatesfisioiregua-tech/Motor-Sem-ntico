app = "chief-os-omni"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  CODE_OS_PROJECT_DIR = "/app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[deploy]
  release_command = "python3 -c 'from core.embed_maintenance import run_maintenance; run_maintenance()'"

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
