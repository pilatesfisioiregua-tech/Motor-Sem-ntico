app = "motor-semantico-omni"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    path = "/health"

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
